<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQA Bootcamp Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <p class="eyebrow">Bootcamp Demo</p>
        <h1>Simple Login Flow</h1>
        <p class="intro">
          Students can automate this page with Playwright and track every
          change with Git.
        </p>

        <form id="login-form" class="form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" value="student" />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            value="bootcamp123"
          />

          <button id="login-button" type="submit">Login</button>
        </form>

        <section id="result" class="result hidden" aria-live="polite">
          <h2>Login Successful</h2>
          <p id="welcome-text">Welcome, future SQA engineer.</p>
          <ul class="checklist">
            <li>Write the automation</li>
            <li>Commit the first working version</li>
            <li>Create a branch for improvements</li>
          </ul>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
